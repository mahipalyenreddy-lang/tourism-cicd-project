name: Tourism CI-CD Pipeline
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run data preparation
        run: python model_building/prep.py
      - name: Run model training
        run: python model_building/train.py
      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tourism-model-artifacts
          path: |
            model_building/best_model.joblib
            model_building/best_model_metadata.json
            model_building/experiment_tracking.csv
      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: mahipalyenreddy/tourism-prediction-space
        run: python hosting/hosting.py
